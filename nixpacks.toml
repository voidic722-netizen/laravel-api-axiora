[phases.setup]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.pdo",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.pgsql",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.curl",
    "php84Extensions.zip",
    "php84Extensions.bcmath",
    "php84Extensions.tokenizer",
    "php84Extensions.ctype",
    "php84Extensions.fileinfo",
    "php84Extensions.openssl",
    "php84Extensions.gd",
]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts",
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
